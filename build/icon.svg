<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2433"/>
      <stop offset="1" stop-color="#090c11"/>
    </linearGradient>
    <linearGradient id="hand" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cdd6e0"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#tile)"/>
  <rect x="64" y="64" width="896" height="896" rx="208" fill="none" stroke="#2b3442" stroke-width="6"/>

  <!-- crown / stem -->
  <rect x="476" y="116" width="72" height="74" rx="22" fill="#3fb950"/>
  <rect x="496" y="92" width="32" height="40" rx="14" fill="#3fb950" transform="rotate(20 512 112)"/>

  <g filter="url(#sh)">
    <!-- track ring -->
    <circle cx="512" cy="512" r="330" fill="none" stroke="#202734" stroke-width="64"/>
    <!-- progress: green -> amber -> red, clockwise, gap at top under crown -->
    <path d="M569.3,187 A330,330 0 1 1 201.9,624.9" fill="none" stroke="#3fb950" stroke-width="64" stroke-linecap="round"/>
    <path d="M201.9,624.9 A330,330 0 0 1 259.2,299.9" fill="none" stroke="#e3b341" stroke-width="64" stroke-linecap="round"/>
    <path d="M259.2,299.9 A330,330 0 0 1 454.7,187" fill="none" stroke="#f0564d" stroke-width="64" stroke-linecap="round"/>
  </g>

  <!-- hand pointing up-right -->
  <line x1="512" y1="512" x2="672.7" y2="320.5" stroke="url(#hand)" stroke-width="40" stroke-linecap="round"/>
  <line x1="512" y1="512" x2="430" y2="594" stroke="url(#hand)" stroke-width="26" stroke-linecap="round" opacity="0.85"/>
  <!-- hub -->
  <circle cx="512" cy="512" r="34" fill="#ffffff"/>
  <circle cx="512" cy="512" r="14" fill="#0e1116"/>
</svg>
